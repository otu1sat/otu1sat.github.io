<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CubeSat Ground Control</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="OtusatWeb.styles.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div id="app">
    <style>
        /* SİBERPUNK YÜKLEME EKRANI (BOOT SEQUENCE) */
        .cyber-loader-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: 'Courier New', Courier, monospace;
        }

        .cyber-loader-content {
            text-align: center;
            width: 80%;
            max-width: 400px;
        }

        .cyber-loader-logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 5px;
            color: #e0e0e0;
            margin-bottom: 25px;
        }

        .cyber-loader-logo .logo-accent {
            color: #00f0ff;
            text-shadow: 0 0 12px #00f0ff;
        }

        .cyber-loader-text {
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: #00f0ff;
            margin-bottom: 15px;
            animation: text-blink 1.5s infinite;
        }

        @keyframes text-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* İlerleme Çubuğu Dış Çerçevesi */
        .loading-progress-container {
            width: 100%;
            height: 4px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        /* Doldurulan Kısım - Blazor'ın otomatik gönderdiği yüzdeye bağlanır */
        .loading-progress-bar {
            height: 100%;
            background: #00f0ff;
            box-shadow: 0 0 10px #00f0ff;
            /* Blazor WebAssembly indirme yüzdesini CSS değişkeni olarak iletir */
            width: var(--blazor-load-percentage, 0%);
            transition: width 0.2s ease;
        }

        /* Yüzde Metni */
        .loading-progress-text {
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffb800; /* Tema rengi sarı */
        }

        /* Blazor'ın hesapladığı tam % değerini ekrana yazdırır */
        .loading-progress-text::after {
            content: var(--blazor-load-percentage-text, "0%");
        }
    </style>

    <div class="cyber-loader-wrapper">
        <div class="cyber-loader-content">
            <div class="cyber-loader-logo">
                <span class="logo-accent">OTU</span>CUBESAT
            </div>

            <div class="cyber-loader-text">TELEMETRİ AĞINA BAĞLANILIYOR...</div>

            <div class="loading-progress-container">
                <div class="loading-progress-bar"></div>
            </div>

            <div class="loading-progress-text">YÜKLENİYOR: </div>
        </div>
    </div>
</div>

<script src="_framework/blazor.webassembly.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="js/site.js"></script>
</body>
</html>
